<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim</title>
    <link rel="stylesheet" href="cafe.css">
</head>
<body>
    <main>
        <section id="iletisim">
            <h2>İletişim</h2>
            <p>Email: info@iris.com | Telefon: 777-777-7777</p>
            <form action="#" method="post" class="contact-form">
                <label for="name">Adınız:</label>
                <input type="text" id="name" name="name" placeholder="Adınızı giriniz" required>
                
                <label for="email">E-posta:</label>
                <input type="email" id="email" name="email" placeholder="E-posta adresinizi giriniz" required>
                
                <label for="message">Mesajınız:</label>
                <textarea id="message" name="message" placeholder="Mesajınızı yazınız" rows="5" required></textarea>
                
                <button type="submit">Gönder</button>
            </form>
            <div class="map-container">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3154.964671601975!2d26.37408657569394!3d38.280436977639785!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14ba04e1651e545b%3A0xf5bc8f34851e5fef!2zQWxhw6d0xLFZLCDEsml6bWly!5e0!3m2!1str!2str!4v1699370235854!5m2!1str!2str" 
                    width="100%" 
                    height="400" 
                    style="border:0;" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </section>
    </main>
</body>
</html>
